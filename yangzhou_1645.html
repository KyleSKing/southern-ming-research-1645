<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1644-1645 扬州攻防战动态态势图</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        :root {
            --ming-color: #e63946;
            --qing-color: #1d3557;
            --bg-color: #f1faee;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft YaHei", serif; background: #222; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #1a1a1a; }
        
        .leaflet-container { background: #111 !important; }
        
        /* 城市标签样式 */
        .city-label { background: transparent !important; border: none !important; box-shadow: none !important; font-weight: bold; color: white !important; text-shadow: 2px 2px 4px black; font-size: 14px; }
        
        /* 旗帜通用动画 */
        @keyframes flag-wave {
            from { transform: skewX(-10deg) translateY(0); }
            to { transform: skewX(10deg) translateY(-2px); }
        }

        /* 明军旗帜：红底白字带黄光 */
        .flag-container {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }
        .ming-flag-icon {
            font-size: 48px;
            color: #e63946;
            animation: flag-wave 1.2s infinite alternate ease-in-out;
            display: inline-block;
            filter: drop-shadow(0 0 8px #ff0);
        }
        .ming-flag-text {
            position: absolute;
            top: 42%; left: 55%;
            transform: translate(-50%, -50%);
            color: white; font-size: 16px; font-weight: 900;
            text-shadow: 1px 1px 2px black;
            font-family: "STSong", "SimSun", serif;
        }

        /* 清军骑兵图标 */
        .qing-cavalry-container {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 10px #0077ff);
        }
        .qing-cavalry-icon {
            font-size: 42px;
            animation: cavalry-move 1.5s infinite ease-in-out;
            display: inline-block;
        }
        .qing-cavalry-text {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 53, 87, 0.9);
            color: #ff0;
            font-size: 14px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #bc9e6c;
            white-space: nowrap;
            text-shadow: 1px 1px 2px black;
        }
        @keyframes cavalry-move {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }

        /* 解决层级问题：旗帜必须最高，且调整偏移 */
        .leaflet-marker-pane .force-label { z-index: 1000 !important; }
        .leaflet-tooltip-pane .city-label { z-index: 500 !important; opacity: 0.7; }

        .ui-panel { position: absolute; z-index: 1000; background: var(--panel-bg); padding: 20px; border-radius: 8px; border: 2px solid #bc9e6c; }
        .info-panel { top: 20px; left: 20px; width: 300px; }
        .timeline-panel { bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        
        h1 { margin: 0 0 10px 0; font-size: 1.4em; color: #432; border-bottom: 2px solid #bc9e6c; padding-bottom: 5px; }
        .date-display { font-size: 1.2em; font-weight: bold; color: #822; margin-bottom: 10px; }
        .description { font-size: 1em; line-height: 1.6; color: #333; height: 120px; overflow-y: auto; }
        
        input[type=range] { width: 100%; cursor: pointer; margin: 15px 0; }
        .legend { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel info-panel">
    <h1>1644-1645 扬州攻防战</h1>
    <div id="current-date" class="date-display">1644年10月</div>
    <div id="event-desc" class="description">加载中...</div>
    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--ming-color)"></span>南明</div>
        <div class="legend-item"><span class="dot" style="background:var(--qing-color)"></span>大清</div>
    </div>
</div>

<div class="ui-panel timeline-panel">
    <input type="range" id="timeline" min="0" max="4" step="1" value="0">
    <div style="display: flex; justify-content: space-between; padding: 0 10px; font-size: 0.9em; color: #444; font-weight: bold;">
        <span>史可法督师</span><span>高杰遇刺</span><span>淮河失守</span><span>围困扬州</span><span>城破殉国</span>
    </div>
</div>

<script>
    const map = L.map('map', { center: [32.5, 119.4], zoom: 7, zoomControl: false, attributionControl: false });

    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ["1", "2", "3", "4"]
    }).addTo(map);

    const locations = { 
        yangzhou: [32.3946, 119.4126], nanjing: [32.0603, 118.7969], 
        sizhou: [33.02, 118.39], huaian: [33.50, 119.13], xuzhou: [34.26, 117.18],
        gaoyou: [32.78, 119.44], yizheng: [32.27, 119.18], taizhou: [32.45, 119.92], jiangdu: [32.43, 119.55] 
    };

    const timelineData = [
        { date: "1644年10月", desc: "南明政权初建。史可法坐镇扬州，构建江北防线。周边高邮、仪征等县加固城防。", mingLines: [[[34.2, 117], [33.5, 119]], [[32.8, 119.4], [32.2, 119.2]]], qingForce: [36, 118], active:['gaoyou','yizheng'] },
        { date: "1645年初", desc: "高杰在徐州遇刺，江北防线动摇。清军主力大举南下。泰州、江都进入备战。", mingLines: [[[33.8, 117], [33.5, 119]]], qingForce: [34.5, 117.5], active:['gaoyou','taizhou'] },
        { date: "1645年4月", desc: "清军渡过淮河。高邮失守，史可法退回扬州。清军前锋逼近江都。", mingLines: [[[32.5, 119.4], [32.2, 119.3]]], qingForce: [33.2, 118.5], active:['jiangdu','gaoyou'] },
        { date: "1645年5月初", desc: "清军合围扬州。多铎扫荡仪征、江都。扬州孤城死守。", qingForce: [32.55, 119.5], qingCircle: true, active:['yizheng','jiangdu'] },
        { date: "1645年5月20日", desc: "城破。史可法殉国。扬州陷落。周边全境易帜。", qingForce: [32.39, 119.41], cityFall: true, active:[] }
    ];

    const layerGroup = L.layerGroup().addTo(map);

    function updateMap(index) {
        layerGroup.clearLayers();
        const data = timelineData[index];
        document.getElementById('current-date').innerText = data.date;
        document.getElementById('event-desc').innerText = data.desc;

        const nameMap = { yangzhou:'扬州', nanjing:'南京', sizhou:'泗州', huaian:'淮安', xuzhou:'徐州', gaoyou:'高邮', yizheng:'仪征', taizhou:'泰州', jiangdu:'江都' };
        Object.keys(locations).forEach(city => {
            L.circleMarker(locations[city], {radius: 6, color: '#fff', fillColor: '#000', fillOpacity: 0.8}).bindTooltip(nameMap[city], {
                permanent: true, 
                direction: 'top', // 改为上方显示，降低与旗帜重叠概率
                offset: [0, -10],
                className: 'city-label'
            }).addTo(layerGroup);
        });

        if (data.mingLines) {
            data.mingLines.forEach(pts => L.polyline(pts, {color: '#e63946', weight: 6, dashArray: '10, 10'}).addTo(layerGroup));
        }

        if (!data.cityFall) {
            // 清军：还原为骑兵图标
            L.marker(data.qingForce, { 
                icon: L.divIcon({ 
                    className:'force-label', 
                    html: `
                        <div class="qing-cavalry-container">
                            <span class="qing-cavalry-icon">🏇</span>
                            <span class="qing-cavalry-text">清军</span>
                        </div>
                    `, 
                    iconSize:[80,80], 
                    iconAnchor:[40,40] 
                }),
                zIndexOffset: 2000
            }).addTo(layerGroup);
            
            // 明军：保持带名字的红旗
            L.marker(locations.yangzhou, { 
                icon: L.divIcon({ 
                    className:'force-label', 
                    html: `<div class="flag-container" style="color:#e63946;"><span class="ming-flag-icon">🚩</span><span class="ming-flag-text">明</span></div>`, 
                    iconSize:[60,60], 
                    iconAnchor:[30,30] 
                }),
                zIndexOffset: 2000 
            }).addTo(layerGroup);
        }

        if (data.qingCircle) L.circle(locations.yangzhou, {radius: 15000, color: '#1d3557', weight: 4, fillOpacity: 0.2}).addTo(layerGroup);
        if (data.cityFall) L.marker(locations.yangzhou, { icon: L.divIcon({className:'city-label', html:'<div style="color:red; font-size:30px; font-weight:900; background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;">陷落</div>'}) }).addTo(layerGroup);
    }

    document.getElementById('timeline').oninput = (e) => updateMap(e.target.value);
    updateMap(0);
</script>
</body>
</html>
