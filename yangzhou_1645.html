<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1644-1645 扬州攻防战动态态势图</title>
    <!-- 使用 CDNJS，这是目前最通用的 CDN 之一 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        :root {
            --ming-color: #e63946;
            --qing-color: #1d3557;
            --bg-color: #f1faee;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft YaHei", serif; background: #222; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #1a1a1a; }
        
        .leaflet-container { background: #111 !important; }
        
        /* 标记样式 */
        .city-label { background: transparent !important; border: none !important; box-shadow: none !important; font-weight: bold; color: white !important; text-shadow: 2px 2px 4px black; font-size: 16px; }
        
        .cavalry-icon {
            font-size: 32px;
            animation: cavalry-move 1.5s infinite ease-in-out;
            display: inline-block;
            filter: drop-shadow(0 0 10px #1d3557);
        }
        @keyframes cavalry-move {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }
        
        .ming-flag-icon {
            font-size: 32px;
            animation: flag-wave 1s infinite alternate ease-in-out;
            display: inline-block;
            filter: drop-shadow(0 0 10px #e63946);
        }
        @keyframes flag-wave {
            from { transform: skewX(-15deg); }
            to { transform: skewX(15deg); }
        }

        .ming-force-label {
            background: rgba(230, 57, 70, 0.9); color: white; padding: 6px 12px; border-radius: 4px; font-size: 14px;
            border: 2px solid #ff0; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 15px rgba(230, 57, 70, 0.8);
        }
        
        .qing-force-label {
            background: rgba(29, 53, 87, 0.9); color: white; padding: 6px 12px; border-radius: 4px; font-size: 14px;
            border: 2px solid #bc9e6c; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 15px rgba(29, 53, 87, 0.8);
        }

        .ui-panel { position: absolute; z-index: 1000; background: var(--panel-bg); padding: 20px; border-radius: 8px; border: 2px solid #bc9e6c; }
        .info-panel { top: 20px; left: 20px; width: 300px; }
        .timeline-panel { bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        
        h1 { margin: 0 0 10px 0; font-size: 1.4em; color: #432; border-bottom: 2px solid #bc9e6c; padding-bottom: 5px; }
        .date-display { font-size: 1.2em; font-weight: bold; color: #822; margin-bottom: 10px; }
        .description { font-size: 1em; line-height: 1.6; color: #333; height: 120px; overflow-y: auto; }
        
        input[type=range] { width: 100%; cursor: pointer; margin: 15px 0; }
        .legend { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel info-panel">
    <h1>1644-1645 扬州攻防战</h1>
    <div id="current-date" class="date-display">1644年10月</div>
    <div id="event-desc" class="description">加载中...</div>
    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--ming-color)"></span>南明</div>
        <div class="legend-item"><span class="dot" style="background:var(--qing-color)"></span>大清</div>
    </div>
</div>

<div class="ui-panel timeline-panel">
    <input type="range" id="timeline" min="0" max="4" step="1" value="0">
    <div style="display: flex; justify-content: space-between; padding: 0 10px; font-size: 0.9em; color: #444; font-weight: bold;">
        <span>史可法督师</span><span>高杰遇刺</span><span>淮河失守</span><span>围困扬州</span><span>城破殉国</span>
    </div>
</div>

<script>
    const map = L.map('map', { center: [32.5, 119.4], zoom: 7, zoomControl: false, attributionControl: false });

    // 百度/高德/OSM 多重保障
    const tiles = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ["1", "2", "3", "4"],
        attribution: 'AutoNavi'
    }).addTo(map);

    const locations = { 
        yangzhou: [32.3946, 119.4126], 
        nanjing: [32.0603, 118.7969], 
        sizhou: [33.02, 118.39], 
        huaian: [33.50, 119.13], 
        xuzhou: [34.26, 117.18],
        gaoyou: [32.78, 119.44],   // 高邮：江北重镇，运河咽喉
        yizheng: [32.27, 119.18],  // 仪征：扼守长江，联系南京
        taizhou: [32.45, 119.92],  // 泰州：扬州东翼屏障
        jiangdu: [32.43, 119.55]   // 江都：扬州紧邻，清军扫荡区
    };

    const timelineData = [
        { 
            date: "1644年10月", 
            desc: "南明政权初建。史可法开督府于扬州，调度‘江北四镇’。高邮、仪征等县开始加固城防，维持运河补给线。", 
            mingLines: [[[34.2, 117], [33.5, 119]], [[32.8, 119.4], [32.2, 119.2]]], 
            qingForce: [36, 118],
            activeCounties: ['gaoyou', 'yizheng'] 
        },
        { 
            date: "1645年初", 
            desc: "高杰在徐州遇刺，江北防线动摇。清主力大举南下。泰州、江都被列为二线战区，民心惶惶。", 
            mingLines: [[[33.8, 117], [33.5, 119]]], 
            qingForce: [34.5, 117.5],
            activeCounties: ['gaoyou', 'taizhou']
        },
        { 
            date: "1645年4月", 
            desc: "清军突破淮河。高邮失守，运河断绝。清前锋席卷江都，包围扬州外围。史可法孤立无援。", 
            mingLines: [[[32.5, 119.4], [32.2, 119.3]]], 
            qingForce: [33.2, 118.5],
            activeCounties: ['jiangdu', 'gaoyou'],
            isCrisis: true
        },
        { 
            date: "1645年5月初", 
            desc: "清军合围扬州。多铎部扫荡仪征，确保长江封锁。扬州彻底成为死城。周边县治或降或残。", 
            qingForce: [32.55, 119.5], 
            qingCircle: true,
            activeCounties: ['yizheng', 'jiangdu']
        },
        { 
            date: "1645年5月20日", 
            desc: "城破。史可法殉国。扬州十日开始。江都、泰州等周边地区全境易帜，南明江北秩序彻底瓦解。", 
            qingForce: [32.39, 119.41], 
            cityFall: true,
            activeCounties: []
        }
    ];

    const layerGroup = L.layerGroup().addTo(map);

    function updateMap(index) {
        layerGroup.clearLayers();
        const data = timelineData[index];
        document.getElementById('current-date').innerText = data.date;
        document.getElementById('event-desc').innerText = data.desc;

        // 绘制城市点
        Object.keys(locations).forEach(city => {
            const isMinor = ['gaoyou', 'yizheng', 'taizhou', 'jiangdu'].includes(city);
            const isActive = data.activeCounties && data.activeCounties.includes(city);
            
            let color = '#fff';
            let radius = isMinor ? 4 : 6;
            
            if (isActive) {
                color = data.isCrisis ? '#ff0' : '#0ff';
                radius = 7;
            }

            L.circleMarker(locations[city], {
                radius: radius, 
                color: color, 
                fillColor: '#000', 
                fillOpacity: 0.8,
                weight: isActive ? 3 : 1
            }).bindTooltip(city === 'yangzhou' ? '' : (city === 'nanjing' ? '南京' : city), {permanent: isMinor && isActive}).addTo(layerGroup);
        });

        if (data.mingLines) {
            data.mingLines.forEach(pts => L.polyline(pts, {color: '#e63946', weight: 6, dashArray: '10, 10'}).addTo(layerGroup));
        }

        if (!data.cityFall) {
            L.marker(data.qingForce, { icon: L.divIcon({ className: '', html: `<div class="qing-force-label"><span class="cavalry-icon">🏇</span>八旗铁骑</div>`, iconSize:[100,50], iconAnchor:[50,25] })}).addTo(layerGroup);
            L.marker(locations.yangzhou, { icon: L.divIcon({ className: '', html: `<div class="ming-force-label"><span class="ming-flag-icon">🚩</span>史可法</div>`, iconSize:[100,50], iconAnchor:[50,25] })}).addTo(layerGroup);
        }

        if (data.qingCircle) {
            L.circle(locations.yangzhou, {radius: 15000, color: '#1d3557', weight: 4, fillOpacity: 0.2}).addTo(layerGroup);
            // 绘制清军向周边的扫荡线
            L.polyline([locations.yangzhou, locations.jiangdu], {color: 'blue', weight: 2, dashArray: '5,5'}).addTo(layerGroup);
            L.polyline([locations.yangzhou, locations.yizheng], {color: 'blue', weight: 2, dashArray: '5,5'}).addTo(layerGroup);
        }
        
        if (data.cityFall) L.marker(locations.yangzhou, { icon: L.divIcon({className:'city-label', html:'<div style="color:red; font-size:30px; font-weight:900;">陷落</div>'}) }).addTo(layerGroup);
    }

    document.getElementById('timeline').oninput = (e) => updateMap(e.target.value);
    updateMap(0);
</script>
</body>
</html>
